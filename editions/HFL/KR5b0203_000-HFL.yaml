front:
  text: 玉籙大齋第一日晚朝儀
  hash: sha256:29bc17aad3efaf6dbe81153d9812010cd15ef133be59ebbb6f27489a8c8b92a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0203_HFL_000-001a, image: hfl/0269/0269-060.png}
body:
  text: 各禮師存念如法神光朗耀瑞炁匝旋箕斗映輝芝宇晏然玉眸含眞寳壇純乾變夜作畫回子午前太華流珠丹鳳飛玄息魔滅奸髙歩祥烟天眞普集齊到帝前發爐同前請稱法位具位與臨壇官衆等謹同誠上啓虚无自然元始天尊无極大道太上道君太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十二天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳瓊臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師上相上宰上保上傳太平下教二十四眞人西城總眞王君太乙眞人東嶽上卿司命茅君定録保命二眞人名山洞府得道神仙三界官屬一切眞靈臣聞三色蔵輝立天根於混沌一神隱妙𦕈億劫於鴻濛道逹重玄理微太漠無形無緒若存若亡涵萬象以凝精泛九陽而開劫散㝠寂玄通之炁上冠丹霄啓芒虚鬱秀之音肇開玉曆自然所化無文不明臣等宿契仙儲叨承靈會竊神章而踴躍遐想思眞蒙大梵以生成精修演教凡有所啓敢不以聞齋意青詞謹當宣奏宣詞具如詞言不違懇欵恩惟大道分别請祈臣聞道開五劫浮光明於空洞之中法出三乗顯濟度於幽冥之内常清常靜曰聖曰神臣等肅奉清齋初臨靜夜神風靜黙河源灌東井之華璇漢昭回石景吐玄隂之魄接群仙而垂䕃聚九炁以舍烟恭假香傳奉修齋直以今晚景行道請法衆等運兹𥘉捻上香願此香烟騰空徑上供養虚无至眞自然大道元始天尊願以是捻香功德上祝當今皇帝介福無疆伏願道合三微躬百禄穰穰簡簡受帝祉以無疆穆穆皇皇荷天休而滋至以䔍億萬年之祐永膺九五福之名四海攸同八方奠服今故燒香自皈依道尊大聖衆至眞之德得道之後保天長存臣聞杳然无象神歸妙有之庭倐爾忘形道在至虚之境既推黙念𠃔格丹𠂻以今落景行道請法衆等運兹二捻上香願此香烟騰空徑上供養玉晨至聖自然靈寳大道天尊願以是捻香功德上資所薦神儀伏願鍊質虚无凝神太素丹臺校籙髙標積善之文紫府言功進陟上仙之品茂延洪福𥙿䕶邦家垂枯儲宫保寧寰海兾百官而精白俾六服以蕃昌永輔皇圖益綏寵禄今故燒香自皈依經尊大聖衆至具之德得道之後昇入無形臣聞積功曠劫由廣度於人天進品仙階在普濟於幽顯用弘眞教以闡玄功以今落景行道請法衆等運兹三捻上香願此香烟騰空徑上供養混元大聖自然化主道德天尊願以是捻香功德上資宗桃先聖社稷尊靈伏願進品玉京飛形翠景還元復本自九轉以成仙合妙登眞叅八辰而會道餐天音於靈府敷帝席於泥丸太乙輔精帝君品命然願佩持寳籙飛昇金闕之中偃息瓊車徑上瑶臺之上福流國祚惠及寰區今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形懴悔三啓三禮重稱法位具位與臨壇官衆等謹同誠上啓三清至尊十方上聖玉京金闕天帝天眞十方師尊聖衆三界官屬一切威靈臣聞三界禮房奉齋盟於三過九陽結篆通冥漠於九幽臣等宿植慶根蚤爲玄裔所冝諸塵漏盡從容千日之長齋萬徧修行披冒九天之靈盻既奉飲丹之誓敢忘列劵之盟濟物度人積功累行今奉來㫖追念神靈伏望上帝垂慈髙眞洞鑑恩頒南極俾金液以鍊形命布柬華冀玉眞而校録遷神閬苑偃息華房逍遥清淨之鄕逰宴虚无之境則上明天尊大慈之化下副臣等皈命之誠謹啓以聞一願慈輝普映二願慧日光垂三願天恩普度四願悟道無爲五願青華鍚命六願逰宴丹臺七願神昇紫極八願鳳馭徘徊九願福延國祚十願登上蓬萊十一願萬眞降鑑十二願陞進瑶階復爐同前謝師回幕玉籙大齋第一日晚朝儀
